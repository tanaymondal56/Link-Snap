name: Build and Publish Docker Images

on:
  push:
    branches: [master, major/k8s]
    tags: ["v*.*.*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  # Allows pushing to a private registry (e.g. AWS ECR, Docker Hub, custom ACR) or defaults to Docker Hub
  REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--no-warnings"

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    steps:
      - name: Check required secrets are set
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_DOMAIN: ${{ secrets.VITE_DOMAIN }}
        run: |
          ERRORS=0
          [[ -z "$VITE_BASE_URL" ]] && echo "❌ VITE_BASE_URL not set" && ERRORS=1
          [[ -z "$VITE_DOMAIN" ]] && echo "❌ VITE_DOMAIN not set" && ERRORS=1
          [[ $ERRORS -eq 1 ]] && exit 1
          echo "✅ All required secrets are present"

  lint:
    uses: ./.github/workflows/lint.yml

  build-frontend:
    name: Build Frontend Image
    needs: [validate-secrets, lint]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-sha-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME || github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ vars.DOCKER_IMAGE_PATH_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/major/k8s' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_DOMAIN=${{ secrets.VITE_DOMAIN }}
            VITE_API_URL=/api

  build-backend:
    name: Build Backend Image
    needs: [validate-secrets, lint]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-sha-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME || github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ vars.DOCKER_IMAGE_PATH_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/major/k8s' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}

  scan-images:
    name: Scan Images for Vulnerabilities
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME || github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ vars.DOCKER_IMAGE_PATH_FRONTEND }}@${{ needs.build-frontend.outputs.image-digest }}"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          args: --platform linux/arm64

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ vars.DOCKER_IMAGE_PATH_BACKEND }}@${{ needs.build-backend.outputs.image-digest }}"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          args: --platform linux/arm64

      - name: Upload frontend Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Upload backend Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
