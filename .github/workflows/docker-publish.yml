name: Build and Publish Docker Images

on:
  push:
    branches: [master, major/k8s]
    tags: ["v*.*.*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ─── Validate Secrets ──────────────────────────────────────────────────────
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    steps:
      - name: Check required secrets are set
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_DOMAIN: ${{ secrets.VITE_DOMAIN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ERRORS=0
          [[ -z "$VITE_BASE_URL" ]]       && echo "❌ VITE_BASE_URL not set"       && ERRORS=1
          [[ -z "$VITE_DOMAIN" ]]         && echo "❌ VITE_DOMAIN not set"         && ERRORS=1
          [[ -z "$DOCKERHUB_USERNAME" ]]  && echo "❌ DOCKERHUB_USERNAME not set"  && ERRORS=1
          [[ -z "$DOCKERHUB_TOKEN" ]]     && echo "❌ DOCKERHUB_TOKEN not set"     && ERRORS=1
          [[ $ERRORS -eq 1 ]] && exit 1
          echo "✅ All required secrets are present"

  # ─── Determine branch type ─────────────────────────────────────────────────
  # beta  → major/k8s branch  → images: *-beta repos, tags: beta + sha-xxx
  # stable→ master branch     → images: * repos,      tags: latest + sha-xxx + semver
  set-matrix:
    name: Set Build Matrix
    runs-on: ubuntu-latest
    needs: [validate-secrets]
    outputs:
      is_beta: ${{ steps.check.outputs.is_beta }}
      frontend_repo: ${{ steps.check.outputs.frontend_repo }}
      backend_repo: ${{ steps.check.outputs.backend_repo }}
    steps:
      - name: Determine target repos
        id: check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/major/k8s" ]]; then
            echo "is_beta=true"              >> $GITHUB_OUTPUT
            echo "frontend_repo=tanaymondal/linksnap-frontend-beta" >> $GITHUB_OUTPUT
            echo "backend_repo=tanaymondal/linksnap-backend-beta"   >> $GITHUB_OUTPUT
          else
            echo "is_beta=false"             >> $GITHUB_OUTPUT
            echo "frontend_repo=tanaymondal/linksnap-frontend"      >> $GITHUB_OUTPUT
            echo "backend_repo=tanaymondal/linksnap-backend"        >> $GITHUB_OUTPUT
          fi

  # ─── Build Frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    needs: [set-matrix]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (beta branch)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.set-matrix.outputs.frontend_repo }}
          tags: |
            # ── Beta branch (major/k8s) ──────────────────────────────────────
            # Always tag :beta so the K8s manifest can pin to a stable mutable tag
            type=raw,value=beta,enable=${{ needs.set-matrix.outputs.is_beta == 'true' }}
            # Short SHA for immutable pinning in kubectl set image
            type=sha,prefix=sha-
            # ── Stable branch (master) ───────────────────────────────────────
            # latest mutable tag
            type=raw,value=latest,enable=${{ needs.set-matrix.outputs.is_beta == 'false' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
            # semver tags from git tag (e.g. v0.6.4 → 0.6.4 and 0.6)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_DOMAIN=${{ secrets.VITE_DOMAIN }}
            VITE_API_URL=/api

  # ─── Build Backend ─────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    needs: [set-matrix]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.set-matrix.outputs.backend_repo }}
          tags: |
            # ── Beta branch ──────────────────────────────────────────────────
            type=raw,value=beta,enable=${{ needs.set-matrix.outputs.is_beta == 'true' }}
            type=sha,prefix=sha-
            # ── Stable branch ────────────────────────────────────────────────
            type=raw,value=latest,enable=${{ needs.set-matrix.outputs.is_beta == 'false' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}

  # ─── Security Scan ─────────────────────────────────────────────────────────
  scan-images:
    name: Scan Images for Vulnerabilities
    needs: [set-matrix, build-frontend, build-backend]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/major/k8s' && 'beta' || 'production' }}
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: "${{ needs.set-matrix.outputs.frontend_repo }}@${{ needs.build-frontend.outputs.image-digest }}"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: "${{ needs.set-matrix.outputs.backend_repo }}@${{ needs.build-backend.outputs.image-digest }}"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload frontend Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Upload backend Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Build Summary
        if: always()
        run: |
          echo "## Docker Build Summary 🐳" >> $GITHUB_STEP_SUMMARY
          echo "| | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | ${{ needs.set-matrix.outputs.is_beta == 'true' && '🧪 Beta' || '🚀 Stable' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend Repo** | \`${{ needs.set-matrix.outputs.frontend_repo }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend Repo** | \`${{ needs.set-matrix.outputs.backend_repo }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend Tag** | \`${{ needs.build-frontend.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend Tag** | \`${{ needs.build-backend.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
