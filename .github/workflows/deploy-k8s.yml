name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build and Publish Docker Images"]
    types: [completed]
    branches: [master, major/k8s]

jobs:
  # ─── Beta Deploy (major/k8s → linksnap-beta namespace) ────────────────────
  deploy-beta:
    name: Deploy Beta (major/k8s → K8s)
    runs-on: ubuntu-latest
    environment: beta
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'major/k8s'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: "Guard: ensure KUBE_CONFIG is set"
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          [[ -z "$KUBE_CONFIG" ]] && echo "❌ KUBE_CONFIG secret not set" && exit 1
          echo "✅ KUBE_CONFIG is present"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.30.0"

      - name: Configure kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Resolve image SHA tag
        id: vars
        run: |
          SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "sha=sha-${SHA}" >> $GITHUB_OUTPUT
          echo "Deploying beta tag: sha-${SHA}"

      # ── Beta: Only backend is deployed to K8s. ──────────────────────────────
      # The React SPA is served by Cloudflare Pages in this architecture.
      # The frontend K8s deployment can optionally be scaled to 0 in beta namespace.
      - name: Update backend image (beta)
        run: |
          kubectl set image deployment/linksnap-backend \
            backend=tanaymondal/linksnap-backend-beta:${{ steps.vars.outputs.sha }} \
            -n linksnap-beta

      - name: Wait for backend rollout (beta)
        run: |
          kubectl rollout status deployment/linksnap-backend -n linksnap-beta --timeout=5m

      - name: Scale frontend to 0 in beta (CF Pages serves the SPA)
        run: |
          kubectl scale deployment/linksnap-frontend --replicas=0 -n linksnap-beta || true

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Beta deployment failed — rolling back backend..."
          kubectl rollout undo deployment/linksnap-backend -n linksnap-beta || true
          echo "✅ Rolled back to previous beta version."

      - name: Beta Deployment Summary
        if: success()
        run: |
          echo "## 🧪 Beta Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | \`linksnap-beta\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend Image** | \`tanaymondal/linksnap-backend-beta:${{ steps.vars.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | Served by Cloudflare Pages (no pod) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.event.workflow_run.head_sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─── Stable Deploy (master → linksnap namespace) ──────────────────────────
  deploy-production:
    name: Deploy Stable (master → K8s)
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: "Guard: ensure KUBE_CONFIG is set"
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          [[ -z "$KUBE_CONFIG" ]] && echo "❌ KUBE_CONFIG secret not set" && exit 1
          echo "✅ KUBE_CONFIG is present"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.30.0"

      - name: Configure kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Resolve image SHA tag
        id: vars
        run: |
          SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "sha=sha-${SHA}" >> $GITHUB_OUTPUT
          echo "Deploying stable tag: sha-${SHA}"

      # ── Stable: Deploy backend with immutable SHA tag ──────────────────────
      - name: Update backend image (stable)
        run: |
          kubectl set image deployment/linksnap-backend \
            backend=tanaymondal/linksnap-backend:${{ steps.vars.outputs.sha }} \
            -n linksnap

      # ── Stable: Frontend pod is optional (CF Pages is still primary) ────────
      # Uncomment if you want a fallback K8s frontend pod in production:
      # - name: Update frontend image (stable)
      #   run: |
      #     kubectl set image deployment/linksnap-frontend \
      #       frontend=tanaymondal/linksnap-frontend:${{ steps.vars.outputs.sha }} \
      #       -n linksnap

      - name: Wait for backend rollout (stable)
        run: |
          kubectl rollout status deployment/linksnap-backend -n linksnap --timeout=5m

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Production deployment failed — rolling back backend..."
          kubectl rollout undo deployment/linksnap-backend -n linksnap || true
          echo "✅ Rolled back to previous stable version."

      - name: Production Deployment Summary
        if: success()
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | \`linksnap\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend Image** | \`tanaymondal/linksnap-backend:${{ steps.vars.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags Also Available** | \`latest\`, \`0.6\`, \`0.6.4\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.event.workflow_run.head_sha }}\` |" >> $GITHUB_STEP_SUMMARY
