server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Hide nginx version from response headers and error pages
    server_tokens off;

    # ── Security Headers (applied globally to ALL responses) ─────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # HSTS — Enforces HTTPS for 1 year with preload. Only effective behind TLS termination.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Serve pre-compressed gzip files from Vite build (if present)
    gzip_static on;

    # ── Upstream backend pool with keepalive connection reuse ─────────────────
    # Defined here via variable — cannot use upstream block in server context.
    # Connection reuse is handled via proxy_http_version 1.1 + Connection "" headers.

    # ── Static assets with hash in filename — cache forever ──────────────────
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Images, fonts — long cache ────────────────────────────────────────────
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Service Worker — no cache ─────────────────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── Web App Manifest — short cache ────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "max-age=3600";
        try_files $uri =404;
    }

    # ── API calls — proxy to backend Kubernetes service ───────────────────────
    location /api/ {
        proxy_pass         http://linksnap-backend-service.linksnap.svc.cluster.local:5000;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Proxy timeouts — prevent hung backend from exhausting workers
        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      60s;

        # Proxy buffer tuning
        proxy_buffer_size       4k;
        proxy_buffers           8 4k;
        proxy_busy_buffers_size 8k;

        # File upload limit (align with backend body-parser limit)
        client_max_body_size    10m;
    }

    # ── Known SPA routes — serve React index.html ─────────────────────────────
    location ~ ^/(login|register|dashboard|admin|admin-console|settings|pricing|changelog|roadmap|profile|appeals|verify|forgot|reset|redeem|bio|legal|u|easter|404) {
        try_files $uri $uri/ /index.html;
    }

    # ── HTML — no cache for instant updates ───────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Short-link fallback — proxy unknown paths to backend redirect engine ──
    location / {
        try_files $uri $uri/ @backend_proxy;
    }

    location @backend_proxy {
        proxy_pass         http://linksnap-backend-service.linksnap.svc.cluster.local:5000;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Redirect timeout should be short — this is a simple DB lookup + 302
        proxy_connect_timeout   5s;
        proxy_send_timeout      10s;
        proxy_read_timeout      10s;
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
