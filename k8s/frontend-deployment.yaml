apiVersion: apps/v1
kind: Deployment
metadata:
  name: linksnap-frontend
  namespace: linksnap
  labels:
    app: linksnap-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linksnap-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: linksnap-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/tanaymondal56/linksnap-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-credentials
