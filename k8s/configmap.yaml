apiVersion: v1
kind: ConfigMap
metadata:
  name: linksnap-config
  namespace: linksnap
data:
  NODE_ENV: "production"
  PORT: "5000"
  DOMAIN: "lksnp.qzz.io"
  BASE_URL: "https://lksnp.qzz.io"
  CLIENT_URL: "https://lksnp.qzz.io"

  # ── CORS: CF Pages + API subdomain + wildcard qzz.io support ────────────────
  # Exact origins for fast path matching (comma-separated)
  ALLOWED_ORIGINS: "https://lksnp.qzz.io,https://api.lksnp.qzz.io,https://link-snap.pages.dev"

  # ── Wildcard subdomain regex ───────────────────────────────────────────────
  # Allows ALL *.lksnp.qzz.io subdomains (api., beta., staging., etc.)
  # The server code also has a built-in BUILTIN_WILDCARD_REGEX for the same purpose.
  DYNAMIC_ALLOWED_DOMAINS_REGEX: '^https:\/\/([a-z0-9-]+\.)*lksnp\.qzz\.io$'

  # ── Cross-Origin Frontend Mode ─────────────────────────────────────────────
  # MUST be "true" because the React SPA is now served from Cloudflare Pages
  # (a different origin than api.lksnp.qzz.io). This switches cookies to
  # SameSite=None;Secure so credentialed cross-origin requests work correctly.
  CROSS_ORIGIN_FRONTEND: "true"

  ADMIN_ENABLED: "true"
  PROXY_GATE_ENABLED: "false"          # No proxy gate needed in K8s — CF Tunnel handles ingress
  REAL_IP_HEADER: "x-forwarded-for"
  # SameSite=None required for cross-origin CF Pages ↔ API credentialed requests
  COOKIE_SAMESITE: "none"
  WEBAUTHN_RP_ID: "lksnp.qzz.io"
  WEBAUTHN_RP_NAME: "Link Snap"
  WEBAUTHN_ORIGIN: "https://lksnp.qzz.io"
  MAX_SESSIONS_PER_USER: "10"
  SESSION_DURATION_DAYS: "30"
  MAX_TRUSTED_DEVICES: "5"
  SUBSCRIPTION_GRACE_PERIOD_DAYS: "7"
  USE_LOCAL_DB: "false"
  LOG_LEVEL: "info"
  K8S_DISABLE_VERSION_SYNC: "true"     # Skip writing package.json on ephemeral container filesystem
  # NOTE: REDIS_URL is set in linksnap-secrets (not here) because it contains credentials.
