apiVersion: apps/v1
kind: Deployment
metadata:
  name: linksnap-backend
  namespace: linksnap
  labels:
    app: linksnap-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linksnap-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: linksnap-backend
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: backend
          image: ghcr.io/tanaymondal56/linksnap-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: linksnap-config
            - secretRef:
                name: linksnap-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/deep
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /api/health
              port: 5000
            failureThreshold: 30
            periodSeconds: 5
      imagePullSecrets:
        - name: ghcr-credentials
